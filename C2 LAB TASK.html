<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Styled Registration Form</title>

    <style>
        /* 1. Body Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 2. Form Container */
        form {
            background-color: #fff;
            padding: 25px 35px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        /* 3. Form Header */
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        /* 4. Labels */
        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: bold;
        }

        /* Input Fields */
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        select {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }

        /* 5. Radio Buttons */
        .gender-group {
            margin-bottom: 15px;
        }

        .gender-group input[type="radio"] {
            margin-right: 5px;
        }

        .gender-group label {
            display: inline-block;
            margin-right: 15px;
            font-weight: normal;
        }

        /* 6. Checkbox */
        .terms {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-weight: normal;
        }

        .terms input[type="checkbox"] {
            margin-right: 8px;
        }

        /* 7. Submit Button */
        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* 8. Focus Effect */
        input:focus, select:focus {
            outline: none;
            border-color: #007BFF;
            box-shadow: 0 0 4px rgba(0, 123, 255, 0.3);
        }

        /* 9. Responsive */
        @media (max-width: 400px) {
            form {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <form>
        <h2>Registration Form</h2>

        <!-- Name -->
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <!-- Email -->
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <!-- Password -->
        <label>Password</label>
        <input type="password" placeholder="Enter password" required>

        <!-- Date -->
        <label>Date of Birth</label>
        <input type="date">

        <!-- Dropdown -->
        <label>Department</label>
        <select>
            <option>Select Department</option>
            <option>CSE</option>
            <option>EEE</option>
            <option>BBA</option>
        </select>

        <!-- Gender -->
        <div class="gender-group">
            <label>Gender</label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </div>

        <!-- Terms -->
        <div class="terms">
            <input type="checkbox">
            <label>I agree to the terms and conditions</label>
        </div>

        <!-- Button -->
        <button type="submit">Register</button>

    </form>

</body>
</html>
